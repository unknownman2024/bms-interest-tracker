name: Fetch BMS Data

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}   # 👈 gh CLI ko auth ke liye

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper

      - name: Run scraper
        run: python aiobms.py

      - name: Upload progress (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bms-progress
          path: |
            progress.json
            scraped_output.json
