name: Fetch Venues & Update Summary

on:
  workflow_dispatch: # ✅ Manual trigger
  schedule:
    - cron: "0 */6 * * *" # ✅ Every 6 hours (change or remove if not needed)

jobs:
  fetch-venues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper pandas

      - name: Run venue fetcher
        run: |
          python your_script_name.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: venue-data
          path: |
            movie_summary.json
            fetchedvenues.json
            processed_venues.json
          if-no-files-found: warn

      - name: Commit updated files (optional)
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add movie_summary.json fetchedvenues.json processed_venues.json || true
          git commit -m "chore: update venue data [skip ci]" || echo "No changes to commit"
          git push
