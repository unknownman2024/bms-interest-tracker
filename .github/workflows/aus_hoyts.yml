name: Australia HOYTS BoxOffice Tracker

on:
  schedule:
      - cron: "30 * * * *"
  workflow_dispatch:        # manually run karne ka option

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        run: python aus_hoyts.py

      - name: Commit & Push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "Australia Data/*.json"
          git commit -m "🔄 Update data $(date -u +"%Y-%m-%d %H:%M:%S")" || echo "No changes to commit"
          git push
